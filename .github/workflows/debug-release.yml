name: Debug APK Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run unit tests
        run: ./gradlew :shared:testAndroidHostTest
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Get commit info
        id: commit_info
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          echo "sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT
      
      - name: Create Debug Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          name: Debug Build - ${{ steps.commit_info.outputs.date }}
          tag_name: debug-latest
          body: |
            Debug APK build from main branch
            
            **Commit**: ${{ steps.commit_info.outputs.sha }}
            **Date**: ${{ steps.commit_info.outputs.date }}
            
            This is an unsigned debug build for testing purposes.
          draft: false
          prerelease: true
